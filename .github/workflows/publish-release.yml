name: Publish Canonical Reference

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate canonical document
        run: |
          python scripts/build_canonical.py

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Generate PDF
        run: |

          mkdir -p release-assets

          cp compiled/*.md release-assets/

          pandoc \
            compiled/*.md \
            -o release-assets/Referentiel-documentaire.pdf
            
      - name: Build HTML
        run: |
          pandoc \
            compiled/*.md \
            -o release-assets/index.html
            
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: referentiel-documentaire
          path: release-assets/

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.md
            release-assets/*.pdf
