name: Publish Canonical Reference

on:
  release:
    types:
      - published
      
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  
jobs:
  publish:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate canonical document
        run: |
          python scripts/build_canonical.py

      - name: Show compiled files
        run: |
          ls -la compiled

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Show generated file
        run: |
          head -40 compiled/Referentiel-documentaire-canonique-latest.md

      - name: Search YAML separators (disabled)
        run: |
          echo "Search YAML separators temporarily disabled"
#          grep -n "^---$" compiled/Referentiel-documentaire-canonique-latest.md || true

      - name: Show first 20 lines with numbers (disabled)
        run: |
          echo "Show first 20 lines with numbers temporarily disabled"
#          nl -ba compiled/Referentiel-documentaire-canonique-latest.md | head -20
          
      - name: Generate PDF (disabled)
        run: |
          echo "PDF generation temporarily disabled"
#
#          mkdir -p release-assets
#
#          cp compiled/*.md release-assets/
#
#          pandoc \
#            compiled/Referentiel-documentaire-canonique-latest.md 
#            -o release-assets/Referentiel-documentaire.pdf
      - name: Generate HTML
        run: |
          mkdir -p release-assets

          cp compiled/*.md release-assets/
          cp README.md release-assets/
          cp LICENSE release-assets/
          cp CHANGELOG.md release-assets/
          cp VERSION.md release-assets/

          pandoc \
            --from=gfm \
            compiled/Referentiel-documentaire-canonique-latest.md \
            -o release-assets/index.html
            
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: referentiel-documentaire
          path: release-assets/

      - name: Publish to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.md
            release-assets/*.pdf

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release-assets

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
