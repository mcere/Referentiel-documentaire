name: Publish Canonical Reference

on:
  release:
    types:
      - published
      
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  
jobs:
  publish:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate canonical document
        run: |
          python scripts/build_canonical.py

      - name: Show compiled files
        run: |
          ls -la compiled

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Show generated file
        run: |
          head -40 compiled/Referentiel-documentaire-canonique-latest.md

      - name: Search YAML separators
        run: |
          grep -n "^---$" compiled/Referentiel-documentaire-canonique-latest.md || true
          
      - name: Generate PDF
        run: |

          mkdir -p release-assets

          cp compiled/*.md release-assets/

          pandoc \
            compiled/Referentiel-documentaire-canonique-latest.md 
            -o release-assets/Referentiel-documentaire.pdf
            
      - name: Build HTML
        run: |
          pandoc \
            compiled/Referentiel-documentaire-canonique-latest.md \
            -o release-assets/index.html
            
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: referentiel-documentaire
          path: release-assets/

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.md
            release-assets/*.pdf

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release-assets

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
